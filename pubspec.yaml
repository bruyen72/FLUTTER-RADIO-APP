name: tecpoint
description: "Survey - Gerenciador de Ordens de Serviço"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.13.2
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  connectivity_plus: ^6.1.4
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  cached_network_image: ^3.4.1
  crypto: ^3.0.3
  archive: ^3.6.1
  workmanager: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 23

flutter_native_splash:
  color: "#050e08"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    icon_background_color: "#050e08"
